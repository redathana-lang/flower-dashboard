<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>FLOW</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#0a1628"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FLOW"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a1628;color:#e8eaf6;min-height:100vh;padding-bottom:80px;}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:#112240;border-radius:20px;padding:40px 30px;width:100%;max-width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.login-logo{width:80px;height:80px;border-radius:16px;margin:0 auto 20px;background:#0a1628;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.login-logo img{width:100%;height:100%;object-fit:contain;}
.login-box h1{font-size:28px;font-weight:700;color:#c9a84c;margin-bottom:4px;}
.login-box p{color:#8892b0;font-size:14px;margin-bottom:30px;}
.login-box input{width:100%;padding:14px 16px;border-radius:10px;border:1.5px solid #1e3a5f;background:#0a1628;color:#e8eaf6;font-size:16px;margin-bottom:12px;outline:none;}
.login-box input:focus{border-color:#c9a84c;}
.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,#c9a84c,#e8c96d);border:none;border-radius:10px;color:#0a1628;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px;}
.login-error{color:#ff6b6b;font-size:13px;margin-top:8px;display:none;}

/* TOP BAR */
#topbar{position:sticky;top:0;z-index:100;background:#112240;border-bottom:1px solid #1e3a5f;padding:12px 16px;display:flex;align-items:center;gap:10px;}
.tb-logo{width:32px;height:32px;border-radius:8px;background:#0a1628;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
.tb-logo img{width:100%;height:100%;object-fit:contain;}
.tb-title{font-size:18px;font-weight:700;color:#c9a84c;flex:1;}
.tb-user{font-size:12px;color:#8892b0;flex:1;text-align:right;}
.btn-bell{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;}
.btn-logout{background:#1e3a5f;border:none;color:#8892b0;font-size:12px;padding:6px 12px;border-radius:8px;cursor:pointer;}

/* BOTTOM NAV */
#bottomNav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:#112240;border-top:1px solid #1e3a5f;display:flex;overflow-x:auto;padding:8px 4px;gap:2px;}
#bottomNav::-webkit-scrollbar{display:none;}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;border:none;background:none;color:#8892b0;font-size:10px;cursor:pointer;border-radius:10px;white-space:nowrap;flex-shrink:0;min-width:60px;}
.nav-btn.active{background:#1e3a5f;color:#c9a84c;}
.nav-btn span:first-child{font-size:18px;}

/* CONTENT */
#app{display:none;}
.section{display:none;padding:16px;}
.section.active{display:block;}

/* DATE FILTER */
.date-filter{background:#112240;border-radius:12px;padding:12px 14px;margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.date-filter label{color:#8892b0;font-size:13px;}
.date-filter input[type=date]{background:#0a1628;border:1.5px solid #1e3a5f;color:#e8eaf6;padding:8px 12px;border-radius:8px;font-size:14px;flex:1;min-width:140px;}
.date-filter input[type=date]:focus{border-color:#c9a84c;outline:none;}
.btn-filter{background:#c9a84c;color:#0a1628;border:none;padding:8px 16px;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;}
.btn-quick{background:#1e3a5f;color:#8892b0;border:none;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;}
.btn-quick.active{background:#c9a84c;color:#0a1628;}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.kpi-card{background:#112240;border-radius:14px;padding:14px;border:1px solid #1e3a5f;}
.kpi-card.full{grid-column:1/-1;}
.kpi-label{font-size:11px;color:#8892b0;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
.kpi-value{font-size:22px;font-weight:700;color:#e8eaf6;line-height:1.1;}
.kpi-value.gold{color:#c9a84c;}
.kpi-sub{font-size:11px;color:#8892b0;margin-top:4px;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;margin-top:6px;}
.badge.up{background:rgba(0,210,100,0.15);color:#00d264;}
.badge.down{background:rgba(255,80,80,0.15);color:#ff5050;}
.badge.neutral{background:rgba(200,200,200,0.1);color:#8892b0;}

/* CHART */
.chart-card{background:#112240;border-radius:14px;padding:16px;margin-bottom:16px;border:1px solid #1e3a5f;}
.chart-title{font-size:13px;color:#8892b0;margin-bottom:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
.chart-wrap{position:relative;height:220px;}

/* LOADING */
.loading{text-align:center;padding:40px;color:#8892b0;}
.spinner{width:32px;height:32px;border:3px solid #1e3a5f;border-top-color:#c9a84c;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* DEPT DETAIL TABLE */
.detail-table{width:100%;border-collapse:collapse;font-size:13px;}
.detail-table th{text-align:left;padding:8px 10px;color:#8892b0;font-weight:500;border-bottom:1px solid #1e3a5f;}
.detail-table td{padding:10px;border-bottom:1px solid #1a2f4a;}
.detail-table tr:last-child td{border-bottom:none;}
.detail-table .val{text-align:right;font-weight:600;}
.detail-table .val.gold{color:#c9a84c;}
.detail-table .section-header{background:#0a1628;color:#c9a84c;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;}

/* REFRESH BTN */
.btn-refresh{background:#1e3a5f;border:none;color:#8892b0;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;}
.btn-refresh:active{background:#c9a84c;color:#0a1628;}

/* EXCEL BTN */
.btn-excel{background:rgba(0,150,80,0.15);border:1px solid rgba(0,150,80,0.3);color:#00c864;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;}

/* NO DATA */
.no-data{text-align:center;padding:40px 20px;color:#8892b0;}
.no-data .icon{font-size:40px;margin-bottom:12px;}

/* SECTION HEADER */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sec-hdr h2{font-size:16px;font-weight:700;color:#e8eaf6;}

/* OCC BAR */
.occ-bar{height:8px;background:#1e3a5f;border-radius:4px;margin-top:8px;overflow:hidden;}
.occ-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#c9a84c,#e8c96d);transition:width 0.5s ease;}
.occ-fill.green{background:linear-gradient(90deg,#00c864,#00ff80);}
.occ-fill.red{background:linear-gradient(90deg,#ff5050,#ff8080);}

/* TOTAL ROW */
.total-row td{font-weight:700;color:#c9a84c;border-top:2px solid #c9a84c !important;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <img src="icon-192.png" alt="Flower"/>
    </div>
    <h1>FLOW</h1>
    <p>Flower Hotels · Daily Operations</p>
    <input type="text" id="loginUser" placeholder="Përdoruesi" autocomplete="username"/>
    <input type="password" id="loginPass" placeholder="Fjalëkalimi" autocomplete="current-password"/>
    <button class="btn-login" onclick="doLogin()">Hyr</button>
    <div class="login-error" id="loginErr">❌ Përdoruesi ose fjalëkalimi gabim</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- TOP BAR -->
  <div id="topbar">
    <div class="tb-logo"><img src="icon-192.png" alt="F"/></div>
    <div class="tb-title">FLOW</div>
    <div class="tb-user" id="tbUser"></div>
    <button class="btn-bell" id="bellBtn" onclick="toggleNotif()" style="display:none">🔕</button>
    <button class="btn-logout" onclick="doLogout()">Dil</button>
  </div>

  <!-- BOTTOM NAV -->
  <div id="bottomNav"></div>

  <!-- SECTIONS -->
  <div id="sections"></div>
</div>

<script>
// ─── USERS ─────────────────────────────────────────────────────────────────
const USERS = {
  'MANAGER': { pass:'Ernest2026', role:'manager', label:'Manager (Ernest)' },
  'FO':      { pass:'FO2026',      role:'fo',      label:'Front Office' },
  'Edisona': { pass:'Edisona2026', role:'spa',     label:'SPA (Edisona)' },
  'Klajdi':  { pass:'Klajdi2026',  role:'fnb',     label:'F&B (Klajdi)' },
  'Erinda':  { pass:'Erinda2026',  role:'ai',      label:'Kënaqësia (Erinda)' },
  'Bruna':   { pass:'Bruna2026',   role:'cashflow',label:'Cash Flow (Bruna)' },
  'Xhina':   { pass:'Xhina2026',   role:'finance', label:'Finance (Xhina)' },
};

const TOTAL_ROOMS = 110;
const EXCHANGE = 100; // 1€ = 100 Lek

let currentUser = null;
let currentRole = null;
let selectedDate = todayStr();
let charts = {};
let notifSub = null;

// ─── HELPERS ────────────────────────────────────────────────────────────────
function todayStr(){
  return new Date().toISOString().split('T')[0];
}
function fmtLek(v){
  if(!v && v!==0) return '—';
  return Number(v).toLocaleString('sq-AL')+ ' Lek';
}
function fmtEur(v){
  if(!v && v!==0) return '—';
  return '€' + Number(v).toLocaleString('sq-AL');
}
function fmtNum(v){
  if(!v && v!==0) return '—';
  return Number(v).toLocaleString('sq-AL');
}
function yoyBadge(curr, prev){
  if(!prev || prev===0) return '<span class="badge neutral">N/A</span>';
  const pct = ((curr-prev)/prev*100).toFixed(1);
  const cls = pct>=0?'up':'down';
  const sym = pct>=0?'▲':'▼';
  return `<span class="badge ${cls}">${sym} ${Math.abs(pct)}%</span>`;
}

// ─── LOGIN ──────────────────────────────────────────────────────────────────
function doLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  const err = document.getElementById('loginErr');
  const user = USERS[u];
  if(!user || user.pass !== p){
    err.style.display='block'; return;
  }
  currentUser = u;
  currentRole = user.role;
  err.style.display='none';
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('tbUser').textContent = user.label;
  if(currentRole==='manager') document.getElementById('bellBtn').style.display='inline';
  buildNav();
  buildSections();
  loadData();
}

function doLogout(){
  currentUser=null; currentRole=null;
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
}

// ─── NAVIGATION ─────────────────────────────────────────────────────────────
const NAV_MANAGER = [
  {id:'overview',icon:'📊',label:'Overview'},
  {id:'fo',icon:'🏨',label:'FO'},
  {id:'fnb',icon:'🍽️',label:'F&B'},
  {id:'spa',icon:'💆',label:'SPA'},
  {id:'cashflow',icon:'💰',label:'Cash Flow'},
  {id:'finance',icon:'📋',label:'Finance'},
];
const NAV_ROLE = {
  'fo':       [{id:'fo',icon:'🏨',label:'Raporti'}],
  'spa':      [{id:'spa',icon:'💆',label:'Raporti'}],
  'fnb':      [{id:'fnb',icon:'🍽️',label:'Raporti'}],
  'ai':       [{id:'ai',icon:'⭐',label:'Raporti'}],
  'cashflow': [{id:'cashflow',icon:'💰',label:'Raporti'}],
  'finance':  [{id:'finance',icon:'📋',label:'Raporti'}],
};

function buildNav(){
  const nav = document.getElementById('bottomNav');
  const items = currentRole==='manager' ? NAV_MANAGER : (NAV_ROLE[currentRole]||[]);
  nav.innerHTML = items.map((n,i)=>
    `<button class="nav-btn${i===0?' active':''}" onclick="showSection('${n.id}')" id="nav_${n.id}">
      <span>${n.icon}</span><span>${n.label}</span>
    </button>`
  ).join('');
}

function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const s = document.getElementById('sec_'+id);
  if(s) s.classList.add('active');
  const b = document.getElementById('nav_'+id);
  if(b) b.classList.add('active');
}

// ─── BUILD SECTIONS ──────────────────────────────────────────────────────────
function buildSections(){
  const wrap = document.getElementById('sections');
  if(currentRole==='manager'){
    wrap.innerHTML = `
      ${secOverview()}
      ${secFO()}
      ${secFNB()}
      ${secSPA()}
      ${secCashFlow()}
      ${secFinance()}
    `;
  } else {
    const roleMap = {fo:secFO,spa:secSPA,fnb:secFNB,ai:secAI,cashflow:secCashFlow,finance:secFinance};
    const fn = roleMap[currentRole];
    wrap.innerHTML = fn ? fn() : '';
  }
  // activate first section
  const first = wrap.querySelector('.section');
  if(first) first.classList.add('active');
}

function dateFilterHTML(id){
  return `<div class="date-filter">
    <label>📅</label>
    <input type="date" id="df_${id}" value="${selectedDate}"/>
    <button class="btn-filter" onclick="applyFilter('${id}')">Shfaq</button>
  </div>`;
}

function secOverview(){
  return `<div class="section" id="sec_overview">
    ${dateFilterHTML('overview')}
    <div class="sec-hdr">
      <h2>Overview Ditor</h2>
      <button class="btn-refresh" onclick="loadData()">↻ Rifresko</button>
    </div>
    <div id="ov_content"><div class="loading"><div class="spinner"></div>Duke ngarkuar...</div></div>
  </div>`;
}
function secFO(){
  return `<div class="section" id="sec_fo">
    ${dateFilterHTML('fo')}
    <div class="sec-hdr"><h2>Front Office</h2></div>
    <div id="fo_content"><div class="loading"><div class="spinner"></div>Duke ngarkuar...</div></div>
  </div>`;
}
function secFNB(){
  return `<div class="section" id="sec_fnb">
    ${dateFilterHTML('fnb')}
    <div class="sec-hdr"><h2>F&B Daily Report</h2></div>
    <div id="fnb_content"><div class="loading"><div class="spinner"></div>Duke ngarkuar...</div></div>
  </div>`;
}
function secSPA(){
  return `<div class="section" id="sec_spa">
    ${dateFilterHTML('spa')}
    <div class="sec-hdr"><h2>SPA Revenues</h2></div>
    <div id="spa_content"><div class="loading"><div class="spinner"></div>Duke ngarkuar...</div></div>
  </div>`;
}
function secCashFlow(){
  return `<div class="section" id="sec_cashflow">
    ${dateFilterHTML('cashflow')}
    <div class="sec-hdr">
      <h2>Cash Flow (Bruna)</h2>
      <button class="btn-excel" onclick="exportExcel('cashflow')">📊 Excel</button>
    </div>
    <div id="cf_content"><div class="loading"><div class="spinner"></div>Duke ngarkuar...</div></div>
  </div>`;
}
function secFinance(){
  return `<div class="section" id="sec_finance">
    ${dateFilterHTML('finance')}
    <div class="sec-hdr">
      <h2>Finance (Xhina)</h2>
      <button class="btn-excel" onclick="exportExcel('finance')">📊 Excel</button>
    </div>
    <div id="fin_content"><div class="loading"><div class="spinner"></div>Duke ngarkuar...</div></div>
  </div>`;
}
function secAI(){
  return `<div class="section" id="sec_ai">
    ${dateFilterHTML('ai')}
    <div class="sec-hdr"><h2>Kënaqësia e Mysafirëve</h2></div>
    <div id="ai_content"><div class="loading"><div class="spinner"></div>Duke ngarkuar...</div></div>
  </div>`;
}

function applyFilter(id){
  const inp = document.getElementById('df_'+id);
  if(inp) selectedDate = inp.value;
  loadData();
}

// ─── LOAD DATA ───────────────────────────────────────────────────────────────
async function loadData(){
  try{
    const res = await fetch(`/api/overview?date=${selectedDate}`);
    if(!res.ok) throw new Error('Server error');
    const d = await res.json();
    renderAll(d);
  } catch(e){
    showError(e.message);
  }
}

function showError(msg){
  ['ov_content','fo_content','fnb_content','spa_content','cf_content','fin_content','ai_content'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.innerHTML=`<div class="no-data"><div class="icon">⚠️</div><p>${msg}</p></div>`;
  });
}

// ─── RENDER ALL ──────────────────────────────────────────────────────────────
function renderAll(d){
  const fo = d.fo||{};
  const fnb = d.fnb||{};
  const spa = d.spa||{};
  const cf = d.cashflow||{};
  const fin = d.finance||{};
  const foY = d.fo_yoy||{};
  const fnbY = d.fnb_yoy||{};
  const spaY = d.spa_yoy||{};

  renderOverview(fo,fnb,spa,cf,foY,fnbY,spaY);
  renderFO(fo,foY);
  renderFNB(fnb,fnbY);
  renderSPA(spa,spaY);
  renderCashFlow(cf);
  renderFinance(fin);
}

// ─── OVERVIEW ────────────────────────────────────────────────────────────────
function renderOverview(fo,fnb,spa,cf,foY,fnbY,spaY){
  const el = document.getElementById('ov_content');
  if(!el) return;

  const dhomaZena = fo.rooms_occupied||0;
  const dhomaLira = TOTAL_ROOMS - dhomaZena;
  const occ = TOTAL_ROOMS>0 ? (dhomaZena/TOTAL_ROOMS*100).toFixed(1) : 0;
  const occCls = occ>=70?'green':occ>=50?'':'red';
  const prevOcc = foY.rooms_occupied ? (foY.rooms_occupied/TOTAL_ROOMS*100).toFixed(1) : null;

  // revenues in Lek
  const hotelRevLek = (fo.revenue_eur||0) * EXCHANGE;
  const fnbTotal = (fnb.flower||0)+(fnb.pool_bar||0)+(fnb.brutal||0)+(fnb.pool_garden||0)+(fnb.beach_bar||0)+(fnb.house_use||0);
  const spaRev = spa.revenues||0;
  const totalRev = hotelRevLek + fnbTotal + spaRev;

  const prevHotelLek = (foY.revenue_eur||0)*EXCHANGE;
  const prevFnb = (fnbY.flower||0)+(fnbY.pool_bar||0)+(fnbY.brutal||0)+(fnbY.pool_garden||0)+(fnbY.beach_bar||0)+(fnbY.house_use||0);
  const prevSpa = spaY.revenues||0;
  const prevTotal = prevHotelLek+prevFnb+prevSpa;

  el.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Dhoma të Zëna</div>
        <div class="kpi-value">${dhomaZena}<span style="font-size:14px;color:#8892b0"> / ${TOTAL_ROOMS}</span></div>
        <div class="occ-bar"><div class="occ-fill ${occCls}" style="width:${Math.min(occ,100)}%"></div></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Dhoma të Lira</div>
        <div class="kpi-value">${dhomaLira}</div>
        <div class="kpi-sub">Okupanca: ${occ}% ${prevOcc?yoyBadge(occ,prevOcc):''}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Xhiro Hotel</div>
        <div class="kpi-value gold">${fmtEur(fo.revenue_eur||0)}</div>
        <div class="kpi-sub">${fmtLek(hotelRevLek)} ${yoyBadge(hotelRevLek,prevHotelLek)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">SPA Revenue</div>
        <div class="kpi-value gold">${fmtLek(spaRev)}</div>
        <div class="kpi-sub">${yoyBadge(spaRev,prevSpa)}</div>
      </div>
      <div class="kpi-card full">
        <div class="kpi-label">Xhiro Totale Ditore</div>
        <div class="kpi-value gold" style="font-size:28px">${fmtLek(totalRev)}</div>
        <div class="kpi-sub">${yoyBadge(totalRev,prevTotal)} krahasuar me të njëjtën ditë ${new Date(selectedDate).getFullYear()-1}</div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-title">Të Ardhura sipas Departamentit (Lek) — YoY</div>
      <div class="chart-wrap"><canvas id="deptChart"></canvas></div>
    </div>

    <div class="chart-card">
      <div class="chart-title">Krahasimi YoY — Xhiro Totale</div>
      <div class="chart-wrap"><canvas id="yoyChart"></canvas></div>
    </div>
  `;

  // Dept chart
  setTimeout(()=>{
    destroyChart('deptChart');
    const depts = ['Flower Rest.','Pool Bar','Brutal','Pool Garden','Beach Bar','House Use','Hotel','SPA','TOTAL'];
    const curr = [
      fnb.flower||0, fnb.pool_bar||0, fnb.brutal||0, fnb.pool_garden||0, fnb.beach_bar||0, fnb.house_use||0,
      hotelRevLek, spaRev, totalRev
    ];
    const prev = [
      fnbY.flower||0, fnbY.pool_bar||0, fnbY.brutal||0, fnbY.pool_garden||0, fnbY.beach_bar||0, fnbY.house_use||0,
      prevHotelLek, prevSpa, prevTotal
    ];
    const ctx = document.getElementById('deptChart');
    if(!ctx) return;
    charts['deptChart'] = new Chart(ctx,{
      type:'bar',
      data:{
        labels:depts,
        datasets:[
          {label:'2026',data:curr,backgroundColor:'rgba(201,168,76,0.8)',borderRadius:4},

// ─── EXCEL EXPORT ────────────────────────────────────────────────────────────
async function exportExcel(type){
  try{
    const res = await fetch(`/api/overview?date=${selectedDate}`);
    const d = await res.json();
    let rows = [['Data',selectedDate]];
    if(type==='cashflow'){
      const cf = d.cashflow||{};
      rows.push(['','']);
      rows.push(['ARKËTIME','']);
      const ark = cf.arketimet||{};
      Object.entries({
        'Non Cash Lek':ark.non_cash_lek||0,'Non Cash Euro':ark.non_cash_euro||0,
        'Reception Cash Euro':ark.reception_cash_euro||0,'Reception Cash Lek':ark.reception_cash_lek||0,
        'Allotment Contracts (€)':ark.allotment||0,'Itaka (€)':ark.itaka||0,
        'Financial Disbursment Loan':ark.financial_loan||0,'F&B Cash Lek':ark.fnb_cash_lek||0,
        'MICE Bank Euro':ark.mice_euro||0,'MICE Bank Lek':ark.mice_lek||0
      }).forEach(([k,v])=>rows.push([k,v]));
      rows.push(['','']);
      rows.push(['PAGESA','']);
      const pag = cf.pagesat||{};
      Object.entries({
        'Paga':pag.paga||0,'Taxes & Utilities':pag.taxes||0,'Loan Euro':pag.loan_euro||0,
        'Loan Lek':pag.loan_lek||0,'House Use':pag.house_use||0,
        'Purchases Cash':pag.purchases_cash||0,'Purchases Bank':pag.purchases_bank||0,
        'Investments Lek':pag.investments_lek||0,'Investments Euro':pag.investments_euro||0,
        'Investments Cash':pag.investments_cash||0
      }).forEach(([k,v])=>rows.push([k,v]));
    } else if(type==='finance'){
      const fin = d.finance||{};
      rows.push(['SHPENZIME MAGAZINË','']);
      Object.entries(fin.shpenzime||{}).forEach(([k,v])=>rows.push([k,v||0]));
      rows.push(['TË ARDHURA MAGAZINË','']);
      Object.entries(fin.ardhura||{}).forEach(([k,v])=>rows.push([k,v||0]));
      rows.push(['ZBRITJE','']);
      Object.entries(fin.zbritje||{}).forEach(([k,v])=>rows.push([k,v||0]));
    }
    const csv = rows.map(r=>r.join(',')).join('\n');
    const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=`${type}_${selectedDate}.csv`; a.click();
    URL.revokeObjectURL(url);
  } catch(e){ alert('Gabim gjatë eksportimit: '+e.message); }
}

// ─── NOTIFICATIONS ───────────────────────────────────────────────────────────
async function toggleNotif(){
  const btn = document.getElementById('bellBtn');
  if(notifSub){
    notifSub=null; btn.textContent='🔕'; return;
  }
  try{
    if(!('serviceWorker' in navigator)||!('PushManager' in window)){
      alert('Njoftimet nuk suportohen në këtë browser.'); return;
    }
    const perm = await Notification.requestPermission();
    if(perm!=='granted'){ alert('Lejoni njoftimet!'); return; }
    const reg = await navigator.serviceWorker.ready;
    const keyRes = await fetch('/api/push/key');
    const {publicKey} = await keyRes.json();
    if(!publicKey||publicKey==='') { alert('Push notifications not configured on server.'); return; }
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly:true,
      applicationServerKey: urlBase64ToUint8Array(publicKey)
    });
    await fetch('/api/push/subscribe',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({subscription:sub,user:'MANAGER'})
    });
    notifSub=sub; btn.textContent='🔔';
    btn.style.color='#c9a84c';
  } catch(e){ console.error(e); }
}

function urlBase64ToUint8Array(base64String){
  const padding='='.repeat((4-base64String.length%4)%4);
  const base64=(base64String+padding).replace(/-/g,'+').replace(/_/g,'/');
  const raw=window.atob(base64);
  const arr=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);
  return arr;
}

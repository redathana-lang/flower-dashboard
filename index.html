<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D1B3E">
<title>FLOW</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<meta name="apple-mobile-web-app-title" content="FLOW">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#071026;--navy2:#0D1B3E;--card:#112250;--card2:#0a1830;--card3:#0e1d3a;
  --gold:#C49A2C;--gold2:#E8B84B;--gold3:rgba(200,154,44,0.12);
  --teal:#176B63;--lteal:#1FA896;--lteal2:rgba(31,168,150,0.12);
  --green:#2DB87A;--green2:rgba(45,184,122,0.12);
  --red:#E05050;--red2:rgba(224,80,80,0.12);
  --amber:#F0A030;--amber2:rgba(240,160,48,0.12);
  --purple:#9B7CE8;
  --white:#EEE8DC;--off:#C8D0DC;
  --muted:#8DA3BD;--muted2:#5A6E88;
  --border:rgba(31,168,150,0.15);--border3:rgba(255,255,255,0.06);--border2:rgba(200,154,44,0.2);
  --f-serif:'Cormorant Garamond',Georgia,serif;
  --f-sans:'DM Sans',-apple-system,sans-serif;
  --f-mono:'DM Mono',monospace;
  --r:10px;--nav-h:64px;--top-h:52px;
}
html,body{height:100%;background:var(--navy);color:var(--white);font-family:var(--f-sans);font-size:14px;overflow:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--card2);border-radius:99px}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:var(--navy);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px}
.lw{background:var(--navy2);border:1px solid var(--border);border-radius:16px;padding:28px 24px;width:100%;max-width:400px}
.ll{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.li{width:40px;height:40px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.li svg{width:18px;height:18px;stroke:#071026;stroke-width:2;fill:none;stroke-linecap:round}
.lt{font-family:var(--f-serif);font-size:19px;font-weight:600}
.ls{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-top:2px}
.llbl{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted2);display:block;margin-bottom:7px;margin-top:16px}
.lsel,.linp{width:100%;background:var(--card);border:1px solid var(--border3);border-radius:8px;padding:13px 14px;color:var(--white);font-family:var(--f-sans);font-size:15px;outline:none;-webkit-appearance:none}
.lsel:focus,.linp:focus{border-color:var(--lteal)}
.lsel option{background:var(--card2)}
.lbtn{margin-top:20px;width:100%;background:linear-gradient(135deg,var(--teal),var(--lteal));border:none;border-radius:10px;padding:14px;color:var(--white);font-size:15px;font-weight:500;cursor:pointer;font-family:var(--f-sans)}
.lerr{font-size:12px;color:var(--red);margin-top:8px;display:none;text-align:center}

/* TOPBAR */
.topbar{background:var(--navy2);border-bottom:1px solid var(--border);padding:0 16px;height:var(--top-h);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100}
.tb-brand{display:flex;align-items:center;gap:10px}
.tb-ico{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-ico svg{width:15px;height:15px;stroke:#071026;stroke-width:2;fill:none;stroke-linecap:round}
.tb-nm{font-family:var(--f-serif);font-size:15px;font-weight:600;line-height:1.1}
.tb-sb{font-size:9px;color:var(--muted);letter-spacing:.6px;text-transform:uppercase}
.tb-r{display:flex;align-items:center;gap:8px}
.ub{background:var(--lteal2);border:1px solid rgba(31,168,150,.25);border-radius:99px;padding:4px 10px;font-size:11px;color:var(--lteal);white-space:nowrap;max-width:130px;overflow:hidden;text-overflow:ellipsis}
.notif-btn{background:transparent;border:1px solid var(--border3);border-radius:6px;padding:6px 10px;font-size:16px;cursor:pointer;line-height:1;display:none}
.notif-btn.on{border-color:var(--gold);background:var(--gold3)}
.outbtn{background:transparent;border:1px solid var(--border3);border-radius:6px;padding:5px 10px;color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--f-sans)}
.refresh-btn{background:transparent;border:1px solid var(--border3);border-radius:6px;padding:5px 10px;color:var(--lteal);font-size:11px;cursor:pointer;font-family:var(--f-sans)}

/* LAYOUT */
.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:210px;background:var(--navy2);border-right:1px solid var(--border);display:none;flex-direction:column;overflow-y:auto;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* MOBILE BOTTOM NAV */
#mobileNav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--navy2);border-top:1px solid var(--border);z-index:200;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;align-items:stretch;padding-bottom:env(safe-area-inset-bottom,0px);display:none}
#mobileNav::-webkit-scrollbar{display:none}
.mn-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 12px;cursor:pointer;border-top:2px solid transparent;flex-shrink:0;min-width:70px}
.mn-item.active{border-top-color:var(--gold2);background:rgba(200,154,44,.07)}
.mn-item .mn-icon{font-size:22px;line-height:1}
.mn-item .mn-lbl{font-size:9px;color:var(--muted);white-space:nowrap}
.mn-item.active .mn-lbl{color:var(--gold2)}

/* SIDEBAR ITEMS */
.sb-s{padding:12px 12px 4px;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted2)}
.dbt{display:flex;align-items:center;gap:9px;padding:10px 12px;cursor:pointer;border-left:2px solid transparent}
.dbt:hover{background:rgba(255,255,255,.03)}
.dbt.active{background:var(--lteal2);border-left-color:var(--lteal)}
.dico{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.dnm{font-size:11px;color:var(--muted)}
.dbt.active .dnm{color:var(--white);font-weight:500}
.dsb{font-size:9px;color:var(--muted2);margin-top:1px}

/* DATE BAR */
.datebar{background:var(--card2);border-bottom:1px solid var(--border3);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.date-input{background:var(--card);border:1px solid var(--border3);border-radius:8px;padding:9px 12px;color:var(--white);font-family:var(--f-mono);font-size:14px;outline:none;flex:1;min-width:140px}
.date-input:focus{border-color:var(--lteal)}
.tab-btn{padding:8px 14px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border3);background:transparent;color:var(--muted);font-family:var(--f-sans)}
.tab-btn.active{background:var(--lteal2);color:var(--lteal);border-color:rgba(31,168,150,.3)}
.refresh-mini{background:linear-gradient(135deg,var(--teal),var(--lteal));border:none;border-radius:7px;padding:9px 16px;color:var(--white);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}

/* CONTENT */
.cnt{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.sh{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted2)}

/* KPI */
.kgrid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi{background:var(--card);border:1px solid var(--border3);border-radius:var(--r);padding:14px;position:relative;overflow:hidden}
.kpi:before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.cg:before{background:linear-gradient(90deg,var(--gold),var(--gold2))}
.kpi.ct:before{background:linear-gradient(90deg,var(--teal),var(--lteal))}
.kpi.cgr:before{background:var(--green)}
.kpi.ca:before{background:var(--amber)}
.kpi.cr:before{background:var(--red)}
.kpi.cp:before{background:var(--purple)}
.kl{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:5px}
.kv{font-family:var(--f-serif);font-size:22px;font-weight:600;color:var(--white);line-height:1}
.ks{font-size:10px;color:var(--muted2);margin-top:4px}
/* YoY badge */
.yoy{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 7px;border-radius:3px;margin-top:5px;font-weight:500}
.yoy.up{background:var(--green2);color:var(--green)}
.yoy.dn{background:var(--red2);color:var(--red)}
.yoy.neu{background:var(--amber2);color:var(--amber)}

/* PANELS */
.panel{background:var(--card);border:1px solid var(--border3);border-radius:var(--r);padding:14px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap}
.pt{font-size:12px;font-weight:500;color:var(--white)}
.pp{font-size:10px;padding:3px 9px;border-radius:99px;background:var(--lteal2);color:var(--lteal);border:1px solid rgba(31,168,150,.2);white-space:nowrap}
.pp.gold{background:var(--gold3);color:var(--gold2);border-color:rgba(200,154,44,.25)}

/* TABLE */
.tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.dt{width:100%;border-collapse:collapse;min-width:320px}
.dt th{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted2);padding:6px 10px;border-bottom:1px solid var(--border3);text-align:left;font-weight:400;white-space:nowrap}
.dt td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.035);font-size:12px;vertical-align:middle}
.dt tr:last-child td{border-bottom:none}
.dt tr:hover td{background:rgba(255,255,255,.02)}
.dm{color:var(--muted)}
.dn{font-family:var(--f-mono);font-size:11px;color:var(--off)}
.mcol{display:flex;flex-direction:column;gap:12px}

/* NO DATA */
.nodata{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;color:var(--muted2);gap:8px;text-align:center}
.nodata-icon{font-size:32px;opacity:.4}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted)}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#112250;border:1px solid rgba(31,168,150,.3);color:var(--white);padding:10px 18px;border-radius:8px;font-size:13px;z-index:9999;max-width:90vw;text-align:center;opacity:0;transition:opacity .3s;pointer-events:none}

/* RESPONSIVE */
@media (max-width:767px){
  .sidebar{display:none !important}
  #mobileNav{display:flex}
  .cnt{padding-bottom:80px}
}
@media (min-width:768px){
  .sidebar{display:flex !important}
  #mobileNav{display:none !important}
  .kgrid2{grid-template-columns:repeat(4,1fr)}
  .mcol{flex-direction:row}
  .mcol>*{flex:1}
  .mcol>*:first-child{flex:1.4}
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="lw">
    <div class="ll">
      <div class="li" style="background:none;padding:0;overflow:hidden"><img src="/icon-192.png" style="width:40px;height:40px;border-radius:10px;display:block"></div>
      <div><div class="lt">Flower Hotels & Resorts</div><div class="ls">Raporti Ditor Operacional</div></div>
    </div>
    <label class="llbl">Zgjidh Përdoruesin</label>
    <select class="lsel" id="loginUser">
      <option value="">— Zgjidh —</option>
      <option value="MANAGER">MANAGER — Ernest Caci</option>
      <option value="FO">FO — Franka / Sara / Xhiku</option>
      <option value="Edisona">Edisona — SPA</option>
      <option value="Klajdi">Klajdi — F&B</option>
      <option value="Erinda">Erinda</option>
      <option value="Bruna">Bruna — Cash Flow</option>
      <option value="Xhina">Xhina — Finance</option>
    </select>
    <label class="llbl">Fjalëkalimi</label>
    <input class="linp" type="password" id="loginPass" placeholder="••••••">
    <div class="lerr" id="loginErr">⚠ Fjalëkalim i gabuar.</div>
    <button class="lbtn" onclick="doLogin()">Hyr në Dashboard</button>
  </div>
</div>

<div class="app" id="appShell" style="display:none">
  <div class="topbar">
    <div class="tb-brand">
      <div class="tb-ico" style="background:none;padding:0;overflow:hidden"><img src="/icon-192.png" style="width:32px;height:32px;border-radius:7px;display:block"></div>
      <div><div class="tb-nm">Flower Hotels</div><div class="tb-sb">Raporti Ditor</div></div>
    </div>
    <div class="tb-r">
      <span class="ub" id="topUser"></span>
      <button class="notif-btn" id="notifBtn" onclick="toggleNotifications()">🔕</button>
      <button class="outbtn" onclick="doLogout()">Dil</button>
    </div>
  </div>
  <div class="body">
    <div class="sidebar" id="sidebar">
      <div class="sb-s">Pamja</div>
      <div class="dbt active" onclick="setView('overview')"><div class="dico" style="background:rgba(200,154,44,.15)">📊</div><div><div class="dnm">Overview</div><div class="dsb">KPI Ditore</div></div></div>
      <div class="dbt" onclick="setView('fo')"><div class="dico" style="background:rgba(31,168,150,.15)">🗝️</div><div><div class="dnm">Front Office</div><div class="dsb">Dhoma & Revenue</div></div></div>
      <div class="dbt" onclick="setView('fnb')"><div class="dico" style="background:rgba(240,160,48,.15)">🍽️</div><div><div class="dnm">F&B</div><div class="dsb">Xhiro Ditore</div></div></div>
      <div class="dbt" onclick="setView('cashflow')"><div class="dico" style="background:rgba(200,154,44,.15)">💰</div><div><div class="dnm">Cash Flow</div><div class="dsb">Hyrje & Dalje</div></div></div>
      <div class="dbt" onclick="setView('expenses')"><div class="dico" style="background:rgba(224,80,80,.15)">📦</div><div><div class="dnm">Shpenzime</div><div class="dsb">Magazina</div></div></div>
    </div>
    <div class="main" id="mainArea">
      <div class="datebar">
        <input type="date" class="date-input" id="datePicker" onchange="loadData()">
        <button class="tab-btn active" id="btnToday" onclick="setToday()">Sot</button>
        <button class="tab-btn" id="btnYesterday" onclick="setYesterday()">Dje</button>
        <button class="refresh-mini" onclick="forceRefresh()">↻ Rifresko</button>
      </div>
      <div class="cnt" id="mainContent"><div class="loading">Duke ngarkuar të dhënat...</div></div>
    </div>
  </div>
  <div id="mobileNav"></div>
</div>
<div id="toast"></div>

<script>
const API = window.location.origin;
const VAPID_PUB = 'BBhLXpHFoobumd5D0D2a-AsZVS30YoZggjPe2X65-_yVYTVGYWEQCbTT53iuag99iJCgqkCGhTW3EjLl5XISaas';
const USERS = {
  MANAGER:{pass:'Ernest2026',name:'Ernest Caci — GM',role:'manager'},
  FO:{pass:'FO2026',name:'Franka / Sara / Xhiku',role:'user'},
  Edisona:{pass:'Edisona2026',name:'Edisona — SPA',role:'user'},
  Klajdi:{pass:'Klajdi2026',name:'Klajdi — F&B',role:'user'},
  Erinda:{pass:'Erinda2026',name:'Erinda',role:'user'},
  Bruna:{pass:'Bruna2026',name:'Bruna — Cash Flow',role:'user'},
  Xhina:{pass:'Xhina2026',name:'Xhina — Finance',role:'user'},
};

let CU=null, VIEW='overview', DATA=null;
let barChart=null, trendChart=null;

document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function doLogin(){
  const uid=document.getElementById('loginUser').value;
  const pw=document.getElementById('loginPass').value;
  const u=USERS[uid];
  if(!u||pw!==u.pass){document.getElementById('loginErr').style.display='block';return;}
  document.getElementById('loginErr').style.display='none';
  CU={...u,uid};
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appShell').style.display='flex';
  document.getElementById('topUser').textContent=u.name;
  buildNav();
  document.getElementById('datePicker').value=td();
  loadData();
  if(CU.uid==='MANAGER'){
    document.getElementById('notifBtn').style.display='block';
    setTimeout(checkNotifStatus,500);
  }
}

function doLogout(){
  CU=null;
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('appShell').style.display='none';
  document.getElementById('loginPass').value='';
  document.getElementById('loginUser').value='';
  document.getElementById('notifBtn').style.display='none';
}

function buildNav(){
  const views=[
    {id:'overview',icon:'📊',lbl:'Overview'},
    {id:'fo',icon:'🗝️',lbl:'Front Off.'},
    {id:'fnb',icon:'🍽️',lbl:'F&B'},
    {id:'cashflow',icon:'💰',lbl:'Cash Flow'},
    {id:'expenses',icon:'📦',lbl:'Shpenzime'},
  ];
  document.getElementById('mobileNav').innerHTML=views.map(v=>
    `<div class="mn-item${v.id===VIEW?' active':''}" id="mn-${v.id}" onclick="setView('${v.id}')">
      <span class="mn-icon">${v.icon}</span><span class="mn-lbl">${v.lbl}</span></div>`
  ).join('');
}

function setView(v){
  VIEW=v;
  document.querySelectorAll('.dbt').forEach((b,i)=>b.classList.toggle('active',['overview','fo','fnb','cashflow','expenses'][i]===v));
  document.querySelectorAll('.mn-item').forEach(b=>b.classList.remove('active'));
  const mn=document.getElementById('mn-'+v);if(mn)mn.classList.add('active');
  if(DATA) renderView();
}

function setToday(){
  document.getElementById('datePicker').value=td();
  document.getElementById('btnToday').classList.add('active');
  document.getElementById('btnYesterday').classList.remove('active');
  loadData();
}
function setYesterday(){
  const y=new Date();y.setDate(y.getDate()-1);
  document.getElementById('datePicker').value=y.toISOString().split('T')[0];
  document.getElementById('btnYesterday').classList.add('active');
  document.getElementById('btnToday').classList.remove('active');
  loadData();
}

async function loadData(){
  const date=document.getElementById('datePicker').value||td();
  document.getElementById('mainContent').innerHTML='<div class="loading">Duke ngarkuar...</div>';
  try{
    const r=await fetch(`${API}/api/overview?date=${date}`);
    DATA=await r.json();
    renderView();
  }catch(e){
    document.getElementById('mainContent').innerHTML='<div class="nodata"><div class="nodata-icon">⚠️</div><p>Gabim gjatë ngarkimit të të dhënave.</p></div>';
  }
}

async function forceRefresh(){
  showToast('Duke rifreskuar të dhënat nga Google Sheets...');
  await fetch(`${API}/api/refresh`,{method:'POST'});
  await loadData();
  showToast('✓ Të dhënat u përditësuan!');
}

function renderView(){
  if(!DATA) return;
  const d=DATA;
  switch(VIEW){
    case 'overview': renderOverview(d); break;
    case 'fo': renderFO(d); break;
    case 'fnb': renderFNB(d); break;
    case 'cashflow': renderCF(d); break;
    case 'expenses': renderExp(d); break;
  }
}

/* ── YoY Badge ── */
function yoyBadge(current, ly, unit='', invert=false){
  if(!ly||ly===0) return '';
  const diff=current-ly;
  const pct=Math.round(diff/Math.abs(ly)*100);
  const isUp=invert?diff<0:diff>0;
  const cls=diff===0?'neu':isUp?'up':'dn';
  const arrow=diff===0?'→':isUp?'↑':'↓';
  return `<div class="yoy ${cls}">${arrow} ${Math.abs(pct)}% vs ${fmtD(DATA.lyDate).slice(0,6)}</div>`;
}

function fmt(n,decimals=0){
  if(!n&&n!==0) return '—';
  return Number(n).toLocaleString('sq-AL',{minimumFractionDigits:decimals,maximumFractionDigits:decimals});
}
function fmtD(d){ try{return new Date(d+'T00:00:00').toLocaleDateString('sq-AL',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return d;} }
function td(){ return new Date().toISOString().split('T')[0]; }

/* ── OVERVIEW ── */
function renderOverview(d){
  const fo=d.fo||{}, fnb=d.fnb||{}, cf=d.cf||{}, exp=d.exp||{};
  const foLY=d.foLY||{}, fnbLY=d.fnbLY||{};
  const occ=fo.nights_avail?Math.round((fo.nights_occ||0)/fo.nights_avail*100):0;
  const occLY=foLY.nights_avail?Math.round((foLY.nights_occ||0)/foLY.nights_avail*100):0;
  const occColor=occ>=70?'cgr':occ>=50?'ca':'cr';
  const fnbTotal=fnb.total||0;
  const fnbTotalLY=fnbLY.total||0;
  const hotelLek = (fo.revenue_euro||0)*100;
  const spa = d.spa||{};
  const spaLY = d.spaLY||{};
  const spaLek = spa.revenues||0;
  const houseLek = fnb.house_use||0;

/* ── NOTIFICATIONS ── */
async function toggleNotifications(){
  const btn=document.getElementById('notifBtn');
  if(Notification.permission==='granted'){
    const sw=await navigator.serviceWorker.ready;
    const sub=await sw.pushManager.getSubscription();
    if(sub){ await sub.unsubscribe(); await fetch(`${API}/api/unsubscribe`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:'MANAGER'})}); btn.textContent='🔕';btn.classList.remove('on');showToast('Njoftimet u çaktivizuan'); }
    else { await subscribeManager(); }
  } else if(Notification.permission==='denied'){
    showToast('Lejoni njoftimet nga cilësimet e browserit.');
  } else {
    const p=await Notification.requestPermission();
    if(p==='granted') await subscribeManager();
  }
}
async function subscribeManager(){
  try{
    const sw=await navigator.serviceWorker.ready;
    const sub=await sw.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64(VAPID_PUB)});
    await fetch(`${API}/api/subscribe`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({subscription:sub.toJSON(),userId:'MANAGER'})});
    document.getElementById('notifBtn').textContent='🔔';document.getElementById('notifBtn').classList.add('on');
    showToast('✓ Njoftimet u aktivizuan!');
  }catch(e){ showToast('Gabim: '+e.message); }
}
async function checkNotifStatus(){
  if(!navigator.serviceWorker) return;
  const btn=document.getElementById('notifBtn');
  if(Notification.permission==='granted'){
    const sw=await navigator.serviceWorker.ready;
    const sub=await sw.pushManager.getSubscription();
    btn.textContent=sub?'🔔':'🔕';btn.classList.toggle('on',!!sub);
  }
}
function urlB64(b64){const p='='.repeat((4-b64.length%4)%4);const r=atob((b64+p).replace(/-/g,'+').replace(/_/g,'/'));return Uint8Array.from([...r].map(c=>c.charCodeAt(0)));}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',4000);
}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js').catch(e=>console.log('SW:',e));
  });
}

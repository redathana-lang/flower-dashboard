<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#071026;--navy2:#0D1B3E;--card:#112250;--card2:#0a1830;--card3:#0e1d3a;
  --gold:#C49A2C;--gold2:#E8B84B;--gold3:rgba(200,154,44,0.12);
  --teal:#176B63;--lteal:#1FA896;--lteal2:rgba(31,168,150,0.12);
  --green:#2DB87A;--green2:rgba(45,184,122,0.12);
  --red:#E05050;--red2:rgba(224,80,80,0.12);
  --amber:#F0A030;--amber2:rgba(240,160,48,0.12);
  --purple:#9B7CE8;
  --white:#EEE8DC;--off:#C8D0DC;
  --muted:#8DA3BD;--muted2:#5A6E88;
  --border:rgba(31,168,150,0.15);--border3:rgba(255,255,255,0.06);--border2:rgba(200,154,44,0.2);
  --f-serif:'Cormorant Garamond',Georgia,serif;
  --f-sans:'DM Sans',-apple-system,sans-serif;
  --f-mono:'DM Mono',monospace;
  --r:10px;--nav-h:64px;--top-h:52px;
}
html,body{height:100%;background:var(--navy);color:var(--white);font-family:var(--f-sans);font-size:14px;overflow:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--card2);border-radius:99px}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
/* LOGIN */
#loginScreen{position:fixed;inset:0;background:var(--navy);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px}
.lw{background:var(--navy2);border:1px solid var(--border);border-radius:16px;padding:28px 24px;width:100%;max-width:420px}
.ll{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.li{width:40px;height:40px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.li svg{width:18px;height:18px;stroke:#071026;stroke-width:2;fill:none;stroke-linecap:round}
.lt{font-family:var(--f-serif);font-size:19px;font-weight:600}
.ls{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-top:2px}
.llbl{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted2);display:block;margin-bottom:7px;margin-top:16px}
.lsel,.linp{width:100%;background:var(--card);border:1px solid var(--border3);border-radius:8px;padding:13px 14px;color:var(--white);font-family:var(--f-sans);font-size:15px;outline:none;-webkit-appearance:none}
.lsel:focus,.linp:focus{border-color:var(--lteal)}
.lsel option{background:var(--card2)}
.lbtn{margin-top:20px;width:100%;background:linear-gradient(135deg,var(--teal),var(--lteal));border:none;border-radius:10px;padding:14px;color:var(--white);font-size:15px;font-weight:500;cursor:pointer;font-family:var(--f-sans)}
.lerr{font-size:12px;color:var(--red);margin-top:8px;display:none;text-align:center}
/* TOPBAR */
.topbar{background:var(--navy2);border-bottom:1px solid var(--border);padding:0 16px;height:var(--top-h);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100}
.tb-brand{display:flex;align-items:center;gap:10px}
.tb-ico{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-ico svg{width:15px;height:15px;stroke:#071026;stroke-width:2;fill:none;stroke-linecap:round}
.tb-nm{font-family:var(--f-serif);font-size:15px;font-weight:600;line-height:1.1}
.tb-sb{font-size:9px;color:var(--muted);letter-spacing:.6px;text-transform:uppercase}
.tb-r{display:flex;align-items:center;gap:8px}
.ub{background:var(--lteal2);border:1px solid rgba(31,168,150,.25);border-radius:99px;padding:4px 10px;font-size:11px;color:var(--lteal);white-space:nowrap;max-width:130px;overflow:hidden;text-overflow:ellipsis}
.outbtn{background:transparent;border:1px solid var(--border3);border-radius:6px;padding:6px 12px;color:var(--muted);font-size:12px;cursor:pointer;font-family:var(--f-sans)}
/* BODY */
.body{display:flex;flex:1;overflow:hidden}
/* DESKTOP SIDEBAR */
.sidebar{width:210px;background:var(--navy2);border-right:1px solid var(--border);display:none;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sb-s{padding:12px 12px 4px;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted2)}
.dbt{display:flex;align-items:center;gap:9px;padding:10px 12px;cursor:pointer;border-left:2px solid transparent;transition:background .15s}
.dbt:hover{background:rgba(255,255,255,.03)}
.dbt.active{background:var(--lteal2);border-left-color:var(--lteal)}
.dico{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.dnm{font-size:11px;color:var(--muted)}
.dbt.active .dnm{color:var(--white);font-weight:500}
.dsb{font-size:9px;color:var(--muted2);margin-top:1px}
.ddot{margin-left:auto;width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-g{background:var(--green)}
.dot-e{background:var(--muted2);opacity:.4}
/* MOBILE BOTTOM NAV */
#mobileNav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--navy2);border-top:1px solid var(--border);z-index:200;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;align-items:stretch;padding-bottom:env(safe-area-inset-bottom,0px);display:flex}
#mobileNav::-webkit-scrollbar{display:none}
.mn-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 12px;cursor:pointer;border-top:2px solid transparent;flex-shrink:0;min-width:70px}
.mn-item.active{border-top-color:var(--gold2);background:rgba(200,154,44,.07)}
.mn-item .mn-icon{font-size:22px;position:relative;line-height:1}
.mn-item .mn-lbl{font-size:9px;color:var(--muted);white-space:nowrap;font-family:var(--f-sans)}
.mn-item.active .mn-lbl{color:var(--gold2)}
.mn-dot{position:absolute;top:-2px;right:-5px;width:8px;height:8px;border-radius:50%}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
/* FILTER BAR */
.fbar{background:var(--card2);border-bottom:1px solid var(--border3);padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.fl{font-size:11px;color:var(--muted);flex-shrink:0}
.fi{background:var(--card);border:1px solid var(--border3);border-radius:7px;padding:9px 10px;color:var(--white);font-family:var(--f-mono);font-size:13px;outline:none;flex:1;min-width:110px}
.fi:focus{border-color:var(--lteal)}
.fsel{background:var(--card);border:1px solid var(--border3);border-radius:7px;padding:9px 10px;color:var(--white);font-family:var(--f-sans);font-size:13px;outline:none;cursor:pointer;-webkit-appearance:none;min-width:100px}
.fsel option{background:var(--card2)}
.fapp{background:linear-gradient(135deg,var(--teal),var(--lteal));border:none;border-radius:7px;padding:10px 18px;color:var(--white);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0}
/* CONTENT */
.cnt{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.sh{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted2)}
/* KPI GRID */
.kgrid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi{background:var(--card);border:1px solid var(--border3);border-radius:var(--r);padding:14px;position:relative;overflow:hidden}
.kpi:before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.cg:before{background:linear-gradient(90deg,var(--gold),var(--gold2))}
.kpi.ct:before{background:linear-gradient(90deg,var(--teal),var(--lteal))}
.kpi.cgr:before{background:var(--green)}
.kpi.ca:before{background:var(--amber)}
.kpi.cr:before{background:var(--red)}
.kpi.cp:before{background:var(--purple)}
.kl{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px}
.kv{font-family:var(--f-serif);font-size:22px;font-weight:600;color:var(--white);line-height:1}
.ks{font-size:10px;color:var(--muted2);margin-top:4px}
/* PANELS */
.panel{background:var(--card);border:1px solid var(--border3);border-radius:var(--r);padding:14px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap}
.pt{font-size:12px;font-weight:500;color:var(--white)}
.pp{font-size:10px;padding:3px 9px;border-radius:99px;background:var(--lteal2);color:var(--lteal);border:1px solid rgba(31,168,150,.2);white-space:nowrap}
.pp.gold{background:var(--gold3);color:var(--gold2);border-color:rgba(200,154,44,.25)}
.pp.amber{background:var(--amber2);color:var(--amber)}
.pp.red{background:rgba(224,80,80,.12);color:var(--red)}
/* COLS */
.mcol{display:flex;flex-direction:column;gap:12px}
/* TABLE */
.tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.dt{width:100%;border-collapse:collapse;min-width:360px}
.dt th{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted2);padding:6px 10px;border-bottom:1px solid var(--border3);text-align:left;font-weight:400;white-space:nowrap}
.dt td{padding:10px;border-bottom:1px solid rgba(255,255,255,.035);font-size:12px;vertical-align:middle}
.dt tr:last-child td{border-bottom:none}
.dm{color:var(--muted)}
.dn{font-family:var(--f-mono);font-size:11px;color:var(--off)}
.badge{font-size:10px;padding:3px 9px;border-radius:4px;font-weight:500;white-space:nowrap}
.badge.ok{background:var(--green2);color:var(--green)}
.badge.miss{background:var(--red2);color:var(--red)}
.edit-btn{background:transparent;border:1px solid var(--border3);border-radius:5px;padding:6px 14px;color:var(--muted);font-size:12px;cursor:pointer;font-family:var(--f-sans)}
.edit-btn:active{background:var(--card2)}
/* DETAIL */
.det-grid{display:flex;flex-direction:column;gap:0}
.det-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border3)}
.det-row.tot-row{border-bottom:none;border-top:1px solid var(--border2);margin-top:4px;padding-top:10px}
.det-lbl{font-size:12px;color:var(--muted);padding-right:10px}
.det-val{font-size:12px;font-family:var(--f-mono);color:var(--off);flex-shrink:0}
.det-val.tot{color:var(--gold2);font-weight:500;font-size:14px}
/* RING */
.ring-wrap{display:flex;align-items:center;justify-content:center;gap:20px;padding:8px 0}
.ri-row{display:flex;align-items:center;gap:8px;font-size:12px;padding:3px 0}
.ri-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
/* INPUT */
.inv{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
.in-hdr{margin-bottom:16px}
.in-hdr h2{font-family:var(--f-serif);font-size:20px;font-weight:600}
.in-hdr p{font-size:12px;color:var(--muted);margin-top:3px}
.fsec{margin-bottom:14px}
.fsec-t{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--gold2);padding-bottom:8px;border-bottom:1px solid var(--border2);margin-bottom:10px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fgrid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ff{display:flex;flex-direction:column;gap:5px}
.ff.full{grid-column:1/-1}
.ff label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.ff input,.ff textarea{background:var(--card);border:1px solid var(--border3);border-radius:8px;padding:13px 14px;color:var(--white);font-family:var(--f-sans);font-size:16px;outline:none;width:100%;-webkit-appearance:none}
.ff input::placeholder,.ff textarea::placeholder{color:var(--muted2)}
.ff input:focus,.ff textarea:focus{border-color:var(--lteal);background:var(--card3)}
.ff input[readonly]{background:var(--card2);color:var(--gold2);font-family:var(--f-mono);border-color:var(--border2)}
.ff textarea{resize:none;min-height:80px;font-size:14px}
.sub-row{display:flex;align-items:center;gap:12px;margin-top:12px;padding-bottom:80px}
.sub-btn{flex:1;background:linear-gradient(135deg,var(--teal),var(--lteal));border:none;border-radius:10px;padding:15px;color:var(--white);font-size:15px;font-weight:500;cursor:pointer;font-family:var(--f-sans)}
.sub-btn:active{opacity:.85}
.save-ok{font-size:12px;display:none;flex-shrink:0}
.edit-banner{background:rgba(240,160,48,.1);border:1px solid rgba(240,160,48,.25);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--amber);margin-bottom:4px}
.empty{display:flex;align-items:center;justify-content:center;padding:28px;color:var(--muted2);font-size:12px}
.export-btn{background:rgba(45,184,122,.15);border:1px solid rgba(45,184,122,.3);border-radius:8px;padding:10px 16px;color:var(--green);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--f-sans);white-space:nowrap}
.export-btn:active{opacity:.8}
/* RESPONSIVE */
@media (min-width:768px){
  .sidebar{display:flex !important}
  #mobileNav{display:none !important}
  .kgrid2{grid-template-columns:repeat(4,1fr)}
  .fgrid{grid-template-columns:repeat(3,1fr)}
  .mcol{flex-direction:row}
  .mcol>*{flex:1}
  .mcol>*:first-child{flex:1.4}
}
@media (max-width:767px){
  .sidebar{display:none !important}
  .cnt{padding-bottom:80px}
  .inv{padding-bottom:80px}
  .kgrid2{grid-template-columns:1fr 1fr}
}
</style>
</head>

/* PWA & NOTIFICATIONS */
async function registerSW(){
  if(!('serviceWorker' in navigator)) return;
  try{ await navigator.serviceWorker.register('/sw.js'); }catch(e){}
}
async function subscribePush(){
  if(!('Notification' in window)||!('serviceWorker' in navigator)) return false;
  try{
    const perm=await Notification.requestPermission();
    if(perm!=='granted') return false;
    const reg=await navigator.serviceWorker.ready;
    const keyRes=await fetch(`${API_BASE}/api/vapid-public-key`);
    const {publicKey}=await keyRes.json();
    const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlBase64ToUint8Array(publicKey)});
    await fetch(`${API_BASE}/api/subscribe`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({subscription:sub,userId:CU?.uid||'unknown'})});
    return true;
  }catch(e){ return false; }
}
function urlBase64ToUint8Array(b64){
  const pad='='.repeat((4-b64.length%4)%4);
  const raw=window.atob((b64+pad).replace(/-/g,'+').replace(/_/g,'/'));
  return new Uint8Array([...raw].map(c=>c.charCodeAt(0)));
}
window.addEventListener('load',registerSW);

document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

  const uid=document.getElementById('loginUser').value;

  if(!u||pw!==u.pass){document.getElementById('loginErr').style.display='block';return;}
  document.getElementById('loginErr').style.display='none';
  CU={...u,uid};

  document.getElementById('appShell').style.display='flex';
  document.getElementById('topUser').textContent=u.name;
  initApp();
  setTimeout(updateNotifBtn, 2000);
}

function applyQF(v){
  const t=new Date();const fmt=d=>d.toISOString().split('T')[0];
  if(v==='today'){document.getElementById('fF').value=fmt(t);document.getElementById('fT').value=fmt(t);}
  else if(v==='yesterday'){const y=new Date(t);y.setDate(y.getDate()-1);document.getElementById('fF').value=fmt(y);document.getElementById('fT').value=fmt(y);}
  else if(v==='week'){const s=new Date(t);s.setDate(s.getDate()-Math.max(0,s.getDay()-1));document.getElementById('fF').value=fmt(s);document.getElementById('fT').value=fmt(t);}
  else if(v==='month'){document.getElementById('fF').value=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-01`;document.getElementById('fT').value=fmt(t);}
  renderMgr();
}

    todayCard=`<div class="panel"><div class="ph"><span class="pt">${cfg.icon} ${cfg.label} — Sot ${fmtD(td())}</span><div style="display:flex;gap:8px;align-items:center"><span class="pp gold">✓ Dorëzuar</span><button class="edit-btn" onclick="openEdit('${deptId}','${td()}')">✏ Edito</button></div></div>${fields}</div>`;
  }else{
    todayCard=`<div class="panel"><div class="ph"><span class="pt">${cfg.icon} ${cfg.label} — Sot</span><span class="badge miss">Nuk është dorëzuar</span></div><div class="empty">Raporti i sotëm nuk është dorëzuar ende.</div></div>`;
  }
  let rows='';
  for(const date of [...dates].reverse()){
    const dat=all[date]?.[deptId];if(!dat)continue;
    let cells=[];
    for(const sec of cfg.sections){
      for(const f of sec.fields){
        if(f.type!=='textarea'&&dat[f.id]!==undefined&&dat[f.id]!==0&&!f.readonly){
          const hCur=f.lb.includes('(Lek)')?'L':f.lb.includes('(€)')?'€':'';
          cells.push(`<span style="color:var(--muted);font-size:10px">${f.lb.split('(')[0].trim().slice(0,18)}:</span> <span class="dn">${Number(dat[f.id]||0).toLocaleString()}${hCur?' '+hCur:''}</span>`);
        }
      }
    }
    rows+=`<tr><td class="dn" style="white-space:nowrap">${fmtD(date)}</td><td style="font-size:10px;line-height:2">${cells.slice(0,4).join(' · ')}</td><td><span class="badge ok">✓</span></td><td><button class="edit-btn" onclick="openEdit('${deptId}','${date}')">✏</button></td></tr>`;
  }
  if(!rows)rows=`<tr><td colspan="4"><div class="empty">Nuk ka të dhëna.</div></td></tr>`;
  el.innerHTML=`
  <div class="sh">${cfg.icon} ${cfg.label} — ${cfg.mgr}</div>
  ${todayCard}
  <div class="panel">
    <div class="ph"><span class="pt">Historiku</span><span class="pp">${from===to?fmtD(from):fmtD(from)+' → '+fmtD(to)}</span></div>
    <div class="tscroll"><table class="dt"><thead><tr><th>Data</th><th>Të Dhënat</th><th>Status</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
  </div>`;
}

function buildFormHtml(cfg,ex){
  let h='';
  for(const sec of cfg.sections){
    h+=`<div class="fsec"><div class="fsec-t">${sec.title}</div><div class="${sec.cols===1?'':sec.cols===2?'fgrid2':'fgrid'}">`;
    for(const f of sec.fields){
      const val=ex[f.id]!==undefined?ex[f.id]:'';
      const full=f.type==='textarea';
      const ro=f.readonly?'readonly':'';
      const oc=f.onchange?`oninput="${f.onchange}"`:'';
      h+=`<div class="ff${full?' full':''}"><label>${f.lb}</label>`;
      if(f.type==='textarea')h+=`<textarea name="${f.id}">${val}</textarea>`;
      else h+=`<input type="number" name="${f.id}" min="0" step="any" value="${val||''}" placeholder="0" ${ro} ${oc}>`;
      h+=`</div>`;
    }
    h+=`</div></div>`;
  }
  return h;
}

function attachAutoCalc(deptId){
  if(deptId==='frontoffice')calcFOTotal();
  if(deptId==='fnb')calcFnbTotal();
  if(deptId==='finance')calcFinance();
  if(deptId==='financefnb')calcXhina();
}
function calcFOTotal(){
  const f=parseFloat(document.querySelector('[name="dhoma_zena_flower"]')?.value)||0;
  const g=parseFloat(document.querySelector('[name="dhoma_zena_garden"]')?.value)||0;
  const t=document.querySelector('[name="dhoma_zena_total"]');if(t)t.value=f+g;
}
function calcFinance(){
  const EUR=95;
  // ARKËTIME — Euro fields × 95, Lek fields direct
  const arkEuroIds=['ark_noncash_euro','ark_cash_euro','ark_mice_euro','ark_allotment','ark_itaka'];
  const arkLekIds=['ark_noncash_lek','ark_cash_lek','ark_loan','ark_fnb_cash','ark_mice_lek'];
  const arkEuro=arkEuroIds.reduce((s,id)=>{const el=document.querySelector(`[name="${id}"]`);return s+(el?parseFloat(el.value)||0:0);},0);
  const arkLek=arkLekIds.reduce((s,id)=>{const el=document.querySelector(`[name="${id}"]`);return s+(el?parseFloat(el.value)||0:0);},0);
  const arkT=Math.round(arkLek+(arkEuro*EUR));
  const at=document.querySelector('[name="ark_totale"]');if(at)at.value=arkT;
  // PAGESA — Euro fields × 95, Lek fields direct
  const pagEuroIds=['pag_loan_euro','pag_inv_euro'];
  const pagLekIds=['pag_paga','pag_taxes','pag_loan_lek','pag_house_use','pag_purch_cash','pag_purch_bank','pag_inv_lek','pag_inv_cash'];
  const pagEuro=pagEuroIds.reduce((s,id)=>{const el=document.querySelector(`[name="${id}"]`);return s+(el?parseFloat(el.value)||0:0);},0);
  const pagLek=pagLekIds.reduce((s,id)=>{const el=document.querySelector(`[name="${id}"]`);return s+(el?parseFloat(el.value)||0:0);},0);
  const pagT=Math.round(pagLek+(pagEuro*EUR));
  const pt=document.querySelector('[name="pag_totale"]');if(pt)pt.value=pagT;
}
function calcFnbTotal(){
  const ids=['xhiro_flower','xhiro_pool_bar','xhiro_brutal','xhiro_pool_bar_garden','xhiro_beach_bar','xhiro_familje'];
  const total=ids.reduce((s,id)=>{const el=document.querySelector(`[name="${id}"]`);return s+(el?parseFloat(el.value)||0:0);},0);
  const familje=parseFloat(document.querySelector('[name="xhiro_familje"]')?.value)||0;
  const tot=document.querySelector('[name="xhiro_totale"]');if(tot)tot.value=total.toFixed(0);
  const net=document.querySelector('[name="ardhura_neto"]');if(net)net.value=(total-familje).toFixed(0);
}
function calcXhina(){
  const shpIds=['shp_hoteli','shp_ai_fnb','shp_flower','shp_pool_bar','shp_pool_bar_garden','shp_garden_brutal','shp_beach_bar','shp_te_tjera'];
  const shpT=shpIds.reduce((s,id)=>{const el=document.querySelector(`[name="${id}"]`);return s+(el?parseFloat(el.value)||0:0);},0);
  const st=document.querySelector('[name="shp_totali"]');if(st)st.value=shpT;
  const ardIds=['ard_room_revenue','ard_flower_rest','ard_pool_bar','ard_garden_brutal','ard_pool_bar_garden','ard_beach_bar','ard_spa_flower','ard_spa_garden','ard_other'];
  const ardT=ardIds.reduce((s,id)=>{const el=document.querySelector(`[name="${id}"]`);return s+(el?parseFloat(el.value)||0:0);},0);
  const at=document.querySelector('[name="ard_totali"]');if(at)at.value=ardT;
  const zbIds=['zb_vila1','zb_vila2','zb_313','zb_fatura_qerasje'];
  const zbT=zbIds.reduce((s,id)=>{const el=document.querySelector(`[name="${id}"]`);return s+(el?parseFloat(el.value)||0:0);},0);
  const zt=document.querySelector('[name="zb_totali"]');if(zt)zt.value=zbT;
}
function recalcTotals(deptId,data){
  if(deptId==='frontoffice')data.dhoma_zena_total=(parseFloat(data.dhoma_zena_flower)||0)+(parseFloat(data.dhoma_zena_garden)||0);
  if(deptId==='fnb'){
    const ids=['xhiro_flower','xhiro_pool_bar','xhiro_brutal','xhiro_pool_bar_garden','xhiro_beach_bar','xhiro_familje'];
    const total=ids.reduce((s,id)=>s+(parseFloat(data[id])||0),0);
    data.xhiro_totale=total;data.ardhura_neto=total-(parseFloat(data.xhiro_familje)||0);
  }
  if(deptId==='finance'){
    const EUR=95;
    const arkEuroIds=['ark_noncash_euro','ark_cash_euro','ark_mice_euro','ark_allotment','ark_itaka'];
    const arkLekIds=['ark_noncash_lek','ark_cash_lek','ark_loan','ark_fnb_cash','ark_mice_lek'];
    const arkEuro=arkEuroIds.reduce((s,id)=>s+(parseFloat(data[id])||0),0);
    const arkLek=arkLekIds.reduce((s,id)=>s+(parseFloat(data[id])||0),0);
    data.ark_totale=Math.round(arkLek+(arkEuro*EUR));
    const pagEuroIds=['pag_loan_euro','pag_inv_euro'];
    const pagLekIds=['pag_paga','pag_taxes','pag_loan_lek','pag_house_use','pag_purch_cash','pag_purch_bank','pag_inv_lek','pag_inv_cash'];
    const pagEuro=pagEuroIds.reduce((s,id)=>s+(parseFloat(data[id])||0),0);
    const pagLek=pagLekIds.reduce((s,id)=>s+(parseFloat(data[id])||0),0);
    data.pag_totale=Math.round(pagLek+(pagEuro*EUR));
  }
  if(deptId==='financefnb'){
    const shpIds=['shp_hoteli','shp_ai_fnb','shp_flower','shp_pool_bar','shp_pool_bar_garden','shp_garden_brutal','shp_beach_bar','shp_te_tjera'];
    data.shp_totali=shpIds.reduce((s,id)=>s+(parseFloat(data[id])||0),0);
    const ardIds=['ard_room_revenue','ard_flower_rest','ard_pool_bar','ard_garden_brutal','ard_pool_bar_garden','ard_beach_bar','ard_spa_flower','ard_spa_garden','ard_other'];
    data.ard_totali=ardIds.reduce((s,id)=>s+(parseFloat(data[id])||0),0);
    const zbIds=['zb_vila1','zb_vila2','zb_313','zb_fatura_qerasje'];
    data.zb_totali=zbIds.reduce((s,id)=>s+(parseFloat(data[id])||0),0);
  }
  return data;
}

    const el=document.getElementById('dot-'+id);if(el)el.className='ddot '+(dayData[id]?'dot-g':'dot-e');
    const mel=document.getElementById('mdot-'+id);if(mel)mel.className='mn-dot '+(dayData[id]?'dot-g':'dot-e');
  }
}

    ['MICE Bank Lek (Lek)','',d.ark_mice_lek||0],
    ['TOTALI ARKËTIME','',d.ark_totale||0],

    ['Loan Euro (€)','',d.pag_loan_euro||0],

async function toggleNotif(){
  const btn=document.getElementById('notifBtn');
  if(!btn) return;
  if(Notification.permission==='granted'){
    // Unsubscribe
    const reg=await navigator.serviceWorker.ready;
    const sub=await reg.pushManager.getSubscription();
    if(sub) await sub.unsubscribe();
    await fetch(`${API_BASE}/api/unsubscribe`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:CU?.uid})});
    btn.classList.remove('on');
    btn.title='Aktivizo njoftimet';
  } else {
    const ok=await subscribePush();
    if(ok){ btn.classList.add('on'); btn.title='Çaktivizo njoftimet'; }
  }
}

async function updateNotifBtn(){
  const btn=document.getElementById('notifBtn');
  if(!btn) return;
  if(!('Notification' in window)){ btn.style.display='none'; return; }
  if(Notification.permission==='granted'){
    const reg=await navigator.serviceWorker.ready;
    const sub=await reg.pushManager.getSubscription();
    if(sub){ btn.classList.add('on'); btn.title='Njoftimet aktive — kliko për t\'i çaktivizuar'; }
    else { btn.classList.remove('on'); btn.title='Aktivizo njoftimet'; }
  } else {
    btn.classList.remove('on'); btn.title='Aktivizo njoftimet';
  }
}

function td(){return new Date().toISOString().split('T')[0];}
function getDates(from,to){
  const ds=[];const c=new Date(from);const e=new Date(to);
  while(c<=e){ds.push(c.toISOString().split('T')[0]);c.setDate(c.getDate()+1);}
  return ds;
}
function fmtD(d){
  try{return new Date(d+'T00:00:00').toLocaleDateString('sq-AL',{day:'2-digit',month:'short',year:'numeric'});}
  catch(e){return d;}
}

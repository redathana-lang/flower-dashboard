<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pastrimi">
<title>Flower Hotel — Pastrimi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a1628;--card:#0f2040;--border:#1a3358;
  --gold:#c9a84c;--gold2:#e8c96d;
  --text:#e8eaf6;--muted:#6b7fa3;
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--orange:#f97316;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
     background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
.hdr{background:var(--card);border-bottom:1px solid var(--border);
     padding:0 14px;height:48px;display:flex;align-items:center;gap:10px;
     position:sticky;top:0;z-index:100;}
.hdr-logo{width:30px;height:30px;border-radius:6px;background:var(--bg);
          overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.hdr-logo img{width:100%;height:100%;object-fit:contain;filter:invert(1) brightness(2);}
.hdr-title{font-size:14px;font-weight:700;color:var(--gold);flex:1;}
.hdr-sub{font-size:10px;color:var(--muted);}

/* BUILDING TABS */
.bld-tabs{background:var(--card);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;}
.bld-tabs::-webkit-scrollbar{display:none;}
.bld-tab{padding:11px 18px;font-size:12px;font-weight:600;cursor:pointer;
         border-bottom:2px solid transparent;color:var(--muted);
         display:flex;align-items:center;gap:5px;white-space:nowrap;
         background:none;border-top:none;border-left:none;border-right:none;}
.bld-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}

/* STATS */
.stats-row{display:flex;padding:8px 14px;background:var(--card);
           border-bottom:1px solid var(--border);flex-wrap:wrap;gap:2px;}
.stat{padding:0 12px 0 0;border-right:1px solid var(--border);margin-right:12px;flex-shrink:0;}
.stat:last-child{border-right:none;margin-right:0;}
.stat-n{font-size:20px;font-weight:800;line-height:1;}
.stat-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:1px;}

/* ACTION BAR */
.action-bar{background:var(--card);border-bottom:1px solid var(--border);
            padding:7px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.action-date{font-size:11px;color:var(--text);font-weight:600;flex:1;min-width:100px;}
.btn{padding:6px 11px;border-radius:6px;font-size:11px;font-weight:600;
     border:none;cursor:pointer;display:flex;align-items:center;gap:5px;}
.btn-reset{background:rgba(239,68,68,.12);color:var(--red);}
.btn-upload{background:rgba(201,168,76,.12);color:var(--gold);}
.btn-reset:active,.btn-upload:active{opacity:.7;}

/* SYNC BAR */
.sync-bar{background:rgba(59,130,246,.06);border-bottom:1px solid var(--border);
          padding:4px 14px;font-size:10px;color:var(--muted);}
.sync-bar a{color:var(--blue);text-decoration:none;}

/* FLOOR */
.floor-section{padding:10px 10px 2px;}
.floor-hdr{display:flex;align-items:center;justify-content:space-between;
           margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.floor-title{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.btn-print{padding:4px 10px;border-radius:5px;font-size:10px;font-weight:600;
           background:rgba(201,168,76,.12);color:var(--gold);border:none;cursor:pointer;}
.btn-print:active{opacity:.7;}

/* TABLE */
.table-wrap{overflow-x:auto;margin-bottom:8px;}
.table-wrap::-webkit-scrollbar{height:3px;}
.table-wrap::-webkit-scrollbar-thumb{background:var(--border);}
.rt{width:100%;border-collapse:collapse;font-size:11px;}
.rt th{background:var(--card);color:var(--muted);font-size:9px;text-transform:uppercase;
       letter-spacing:.4px;padding:5px 4px;border-bottom:1px solid var(--border);
       text-align:center;white-space:nowrap;}
.rt td{padding:3px 3px;border-bottom:1px solid rgba(26,51,88,.4);vertical-align:middle;}

/* ROOM NUMBER BADGE */
.room-nr{font-size:12px;font-weight:700;padding:3px 5px;border-radius:4px;
         display:inline-block;min-width:40px;text-align:center;white-space:nowrap;}
.s-liree{color:var(--muted);}
.s-ardhje{background:rgba(34,197,94,.15);color:var(--green);}
.s-largim{background:rgba(239,68,68,.15);color:var(--red);}
.s-qendrim{background:rgba(59,130,246,.15);color:var(--blue);}

/* STATUS SELECT */
.sel-status{background:var(--bg);border:1px solid var(--border);color:var(--text);
            font-size:10px;padding:3px 3px;border-radius:4px;outline:none;
            cursor:pointer;width:88px;}

/* PASTRIMI BUTTON */
.btn-pas{padding:3px 7px;border-radius:4px;font-size:10px;font-weight:700;
         border:none;cursor:pointer;white-space:nowrap;}
.pas-paster{background:var(--green);color:#fff;}
.pas-piseet{background:var(--red);color:#fff;}
.btn-pas:active{opacity:.7;}

/* CHECKBOXES */
.cb{text-align:center;}
input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--gold);}

/* NOTES */
.inp-notes{background:rgba(26,51,88,.25);border:1px solid var(--border);color:var(--text);
           font-size:10px;padding:3px 5px;border-radius:4px;outline:none;
           width:100%;min-width:70px;}
.inp-notes::placeholder{color:var(--muted);}

.td-pers{text-align:center;color:var(--muted);font-size:11px;}
.td-date{text-align:center;color:var(--text);font-size:10px;white-space:nowrap;}

/* LOADING */
#overlay{position:fixed;inset:0;background:rgba(10,22,40,.85);
         display:flex;align-items:center;justify-content:center;z-index:999;}
.spinner{width:36px;height:36px;border:3px solid var(--border);
         border-top-color:var(--gold);border-radius:50%;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{color:var(--muted);margin-top:12px;font-size:13px;}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
       background:var(--card);border:1px solid var(--border);border-radius:8px;
       padding:8px 18px;font-size:12px;color:var(--gold);display:none;z-index:500;white-space:nowrap;}

/* BOTTOM BAR */
.bot-bar{padding:10px 14px;background:var(--card);border-top:1px solid var(--border);
         display:flex;align-items:center;justify-content:space-between;position:sticky;bottom:0;}
.bot-date{font-size:11px;color:var(--muted);}
.bot-refresh{background:var(--border);border:none;color:var(--muted);
             font-size:11px;padding:6px 12px;border-radius:7px;cursor:pointer;}
.bot-refresh:active{background:var(--gold);color:var(--bg);}

@media(max-width:480px){
  .stat{padding:0 8px 0 0;margin-right:8px;}
  .stat-n{font-size:16px;}
}
</style>
</head>
<body>

<div id="overlay">
  <div style="text-align:center">
    <div class="spinner"></div>
    <div class="loading-txt">Duke ngarkuar...</div>
  </div>
</div>
<div id="toast"></div>

<div class="hdr">
  <div class="hdr-logo">
    <img src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQH/2wBDAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQH/wAARCABkAGQDASIAAhEBAxEB/8QAGgABAAMBAQEAAAAAAAAAAAAAAAUGBwQCA//EACsQAAICAQQBAwMFAQAAAAAAAAECAAMEBREGEiExQVETImEHFCNxgaH/xAAXAQEBAQEAAAAAAAAAAAAAAAAAAQID/8QAHBEBAQACAgMAAAAAAAAAAAAAAQAREiExQVH/2gAMAwEAAhEDEQA/AP2SJERERARARERARARARARARARARARERERARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARARAR/9k=" alt="Flower Hotel">
  </div>
  <div>
    <div class="hdr-title">FLOWER HOTEL</div>
    <div class="hdr-sub">Sistemi i Pastrimit</div>
  </div>
</div>

<div class="bld-tabs">
  <button class="bld-tab active" id="tf" onclick="switchBld('flower')">
    <span class="dot" style="background:#ef4444"></span>Flower Hotel
  </button>
  <button class="bld-tab" id="tg" onclick="switchBld('garden')">
    <span class="dot" style="background:#22c55e"></span>Garden Hotel
  </button>
</div>

<div class="stats-row" id="stats"></div>

<div class="action-bar">
  <span class="action-date" id="actionDate"></span>
  <button class="btn btn-reset" onclick="resetDay()">🔄 Reset Ditës</button>
  <button class="btn btn-upload" onclick="document.getElementById('triFile').click()">📤 Ngarko Excel Trinosoft</button>
  <input type="file" id="triFile" accept=".xls,.xlsx" style="display:none" onchange="handleTrinosoft(this)">
</div>

<div class="sync-bar" id="syncBar"></div>

<div id="cards" style="padding-bottom:64px;"></div>

<div class="bot-bar">
  <span class="bot-date" id="botDate"></span>
  <button class="bot-refresh" onclick="pullAndRender()">↻ Rifresko</button>
</div>

<script>
'use strict';

// ─── INVENTORY ────────────────────────────────────────────────────────────────
const INV = {
  flower: {
    'Kati 1': ['101','102','103','104','105','106','107','108','109','110','111','112','113','114'],
    'Kati 2': ['201','202','203','204','205','206','207','208','209','210','211','212','213','214'],
    'Kati 3': ['301','302','303','304','305','306','307','308','309','310','311','312','313','314'],
    'Kati 4': ['401','402','403','404','405','406','407','408','409','410','411','412','413','414'],
    'Kati 5': ['501','502','503','504','505','506','507','508','509','510','511','512','513'],
    'Vilat':  ['VILA 1','VILA 2']
  },
  garden: {
    'Kati 1': ['G101','G102','G103','G104','G105','G106','G107','G108','G109','G110','G111','G112','G114','G115'],
    'Kati 2': ['G201','G202','G203','G204','G205','G206','G207','G208','G209','G210','G211','G212','G214','G215'],
    'Kati 3': ['G301','G302','G303','G304','G305','G306','G307','G308','G309','G310','G311','G312','G314','G315']
  }
};

let bld = 'flower';
let rooms = {};

// ─── INIT ROOMS ───────────────────────────────────────────────────────────────
function initRooms() {
  for (const [b, floors] of Object.entries(INV))
    for (const [fl, nums] of Object.entries(floors))
      for (const num of nums) {
        const k = b + '-' + num;
        if (!rooms[k]) rooms[k] = {
          num, bld: b, fl,
          status: 'liree', clean: 'piseet',
          persons: '', checkin: '', checkout: '',
          guestName: '', company: '', hkNotes: '',
          vip: false, rom: false, dec: false, wp: false, bc: false,
          notes: '', ts: null
        };
      }
}

// ─── DATE HELPERS ─────────────────────────────────────────────────────────────
const DAYS = ['E Diel','E Hënë','E Martë','E Mërkurë','E Enjte','E Premte','E Shtunë'];
const MONS = ['Janar','Shkurt','Mars','Prill','Maj','Qershor','Korrik','Gusht','Shtator','Tetor','Nëntor','Dhjetor'];
function dateAlb(d) { return DAYS[d.getDay()] + ', ' + d.getDate() + ' ' + MONS[d.getMonth()] + ' ' + d.getFullYear(); }
function nowHM() { const d = new Date(); return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── SWITCH BUILDING ──────────────────────────────────────────────────────────
function switchBld(b) {
  bld = b;
  document.getElementById('tf').className = 'bld-tab' + (b === 'flower' ? ' active' : '');
  document.getElementById('tg').className = 'bld-tab' + (b === 'garden' ? ' active' : '');
  render();
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function computeStats() {
  const rs = Object.values(rooms).filter(r => r.bld === bld);
  return {
    total:   rs.length,
    liree:   rs.filter(r => r.status === 'liree').length,
    qendrim: rs.filter(r => r.status === 'qendrim').length,
    ditore:  rs.filter(r => r.checkin && r.checkin === r.checkout).length,
    ardhje:  rs.filter(r => r.status === 'ardhje').length,
    largim:  rs.filter(r => r.status === 'largim').length
  };
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const s = computeStats();
  document.getElementById('stats').innerHTML =
    '<div class="stat"><div class="stat-n" style="color:var(--text)">' + s.total + '</div><div class="stat-l">Total</div></div>' +
    '<div class="stat"><div class="stat-n" style="color:var(--green)">' + s.liree + '</div><div class="stat-l">E Lirë</div></div>' +
    '<div class="stat"><div class="stat-n" style="color:var(--blue)">' + s.qendrim + '</div><div class="stat-l">Totales</div></div>' +
    '<div class="stat"><div class="stat-n" style="color:var(--orange)">' + s.ditore + '</div><div class="stat-l">Ditore</div></div>' +
    '<div class="stat"><div class="stat-n" style="color:var(--green)">' + s.ardhje + '</div><div class="stat-l">Ardhje</div></div>' +
    '<div class="stat"><div class="stat-n" style="color:var(--red)">' + s.largim + '</div><div class="stat-l">Ikje</div></div>';

  const now = new Date();
  const ds = dateAlb(now);
  document.getElementById('actionDate').textContent = ds;
  document.getElementById('botDate').textContent = ds;

  const floors = INV[bld];
  let html = '';
  for (const fl of Object.keys(floors)) {
    const nums = floors[fl];
    html += '<div class="floor-section">' +
      '<div class="floor-hdr">' +
        '<div class="floor-title">' + fl + '</div>' +
        '<button class="btn-print" onclick="printFloor(\'' + esc(fl) + '\')">🖨 Printo ' + fl + '</button>' +
      '</div>' +
      '<div class="table-wrap">' +
        '<table class="rt">' +
          '<thead><tr>' +
            '<th>Nr.</th><th>Pers.</th><th>Check In</th><th>Check Out</th>' +
            '<th>Status</th><th>Pastrimi</th>' +
            '<th>VIP</th><th>ROM</th><th>DEC</th><th>WP</th><th>BC</th>' +
            '<th>Shënime</th>' +
          '</tr></thead>' +
          '<tbody>';

    for (const num of nums) {
      const k = bld + '-' + num;
      const r = rooms[k];
      if (!r) continue;
      const nrCls = 's-' + r.status;
      const pasCls = r.clean === 'paster' ? 'pas-paster' : 'pas-piseet';
      const pasLbl = r.clean === 'paster' ? 'E Pastër' : 'E Pisët';
      html += '<tr>' +
        '<td><span class="room-nr ' + nrCls + '">' + num + '</span></td>' +
        '<td class="td-pers">' + (r.persons || '–') + '</td>' +
        '<td class="td-date">' + (r.checkin || '.') + '</td>' +
        '<td class="td-date">' + (r.checkout || '.') + '</td>' +
        '<td><select class="sel-status" onchange="setStatus(\'' + k + '\',this.value)">' +
          '<option value="liree"' + (r.status === 'liree' ? ' selected' : '') + '>E lirë</option>' +
          '<option value="ardhje"' + (r.status === 'ardhje' ? ' selected' : '') + '>Ardhje</option>' +
          '<option value="largim"' + (r.status === 'largim' ? ' selected' : '') + '>Largim</option>' +
          '<option value="qendrim"' + (r.status === 'qendrim' ? ' selected' : '') + '>Qëndrim</option>' +
        '</select></td>' +
        '<td><button class="btn-pas ' + pasCls + '" onclick="toggleClean(\'' + k + '\')">' + pasLbl + '</button></td>' +
        '<td class="cb"><input type="checkbox"' + (r.vip ? ' checked' : '') + ' onchange="setFlag(\'' + k + '\',\'vip\',this.checked)"></td>' +
        '<td class="cb"><input type="checkbox"' + (r.rom ? ' checked' : '') + ' onchange="setFlag(\'' + k + '\',\'rom\',this.checked)"></td>' +
        '<td class="cb"><input type="checkbox"' + (r.dec ? ' checked' : '') + ' onchange="setFlag(\'' + k + '\',\'dec\',this.checked)"></td>' +
        '<td class="cb"><input type="checkbox"' + (r.wp  ? ' checked' : '') + ' onchange="setFlag(\'' + k + '\',\'wp\',this.checked)"></td>' +
        '<td class="cb"><input type="checkbox"' + (r.bc  ? ' checked' : '') + ' onchange="setFlag(\'' + k + '\',\'bc\',this.checked)"></td>' +
        '<td><input class="inp-notes" type="text" value="' + esc(r.notes || '') + '" placeholder="Shënim..." onchange="setNotes(\'' + k + '\',this.value)"></td>' +
      '</tr>';
    }

    html += '</tbody></table></div></div>';
  }
  document.getElementById('cards').innerHTML = html;
}

// ─── ROOM ACTIONS ─────────────────────────────────────────────────────────────
async function toggleClean(k) {
  rooms[k].clean = rooms[k].clean === 'paster' ? 'piseet' : 'paster';
  rooms[k].ts = nowHM();
  render();
  await push(true);
}

async function setStatus(k, v) {
  rooms[k].status = v;
  rooms[k].ts = nowHM();
  render();
  await push(true);
}

async function setFlag(k, flag, v) {
  rooms[k][flag] = v;
  await push(true);
}

async function setNotes(k, v) {
  rooms[k].notes = v;
  await push(true);
}

// ─── RESET DAY ────────────────────────────────────────────────────────────────
async function resetDay() {
  if (!confirm('Resetoni të dhënat e ditës? Statuset dhe të dhënat nga Trinosoft do të fshihen.')) return;
  for (const k of Object.keys(rooms)) {
    if (rooms[k].bld === bld) {
      rooms[k].status   = 'liree';
      rooms[k].persons  = '';
      rooms[k].checkin  = '';
      rooms[k].checkout = '';
      rooms[k].guestName = '';
      rooms[k].company  = '';
      rooms[k].hkNotes  = '';
    }
  }
  render();
  await push(false);
  showToast('✅ Dita u resetua');
}

// ─── TRINOSOFT PARSER ─────────────────────────────────────────────────────────
// THE FIX: "G 112" (with space) → "G112" (no space) to match inventory keys
function normRoom(raw) {
  raw = String(raw || '').trim().toUpperCase().replace(/\s+/g, ' ');
  // Garden rooms: "G 112" → "G112", "G 204" → "G204"
  var gm = raw.match(/^G\s+(\d+)$/);
  if (gm) return 'G' + gm[1];
  // Villa rooms: "VILA 1" stays as-is (INV key is "VILA 1")
  if (/^VILA\s+\d+$/.test(raw)) return raw;
  // Flower rooms with type suffix: "105 TR" → "105", "504 DX" → "504"
  var nm = raw.match(/^(\d{3,4})(?:\s+[A-Z]{1,3})?$/);
  if (nm) return nm[1];
  return raw;
}

function fmtDate(v) {
  var s = String(v || '').trim();
  var m = s.match(/^(\d{1,2})\/(\d{1,2})\/\d{2,4}$/);
  if (m) return m[1].padStart(2,'0') + '/' + m[2].padStart(2,'0');
  return s;
}

function handleTrinosoft(inp) {
  var f = inp.files[0];
  if (!f) return;
  var rd = new FileReader();
  rd.onload = function(e) {
    try {
      var wb = XLSX.read(e.target.result, { type: 'array' });
      var parsed = parseTrinosoft(wb);
      applyTrinosoft(parsed);
    } catch(err) {
      alert('Gabim gjatë leximit të Excel: ' + err.message);
    }
    inp.value = '';
  };
  rd.readAsArrayBuffer(f);
}

function parseTrinosoft(wb) {
  var sheet = wb.Sheets[wb.SheetNames[0]];
  var rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
  var cat = 'liree';
  var out = {};

  for (var i = 0; i < rows.length; i++) {
    var row = rows[i];
    var a = String(row[0] || '').trim();
    var b = String(row[1] || '').trim();

    if (!a && !b) continue;

    // Category / section header row (column A has content)
    if (a) {
      var al = a.toLowerCase();
      if (al.startsWith('total') || al.startsWith('totali')) continue; // skip subtotals
      if (a.indexOf('Ardhjet') >= 0 || a.indexOf('Ardhje') >= 0)       cat = 'ardhje';
      else if (a.indexOf('Largimet') >= 0 || a.indexOf('Largim') >= 0) cat = 'largim';
      else if (a.indexOf('ndrim') >= 0 || a.indexOf('endrim') >= 0)    cat = 'qendrim'; // Qëndrimet
      else                                                               cat = 'liree';  // (none)
      continue;
    }

    // Data row (A is blank, B has room number)
    if (!b) continue;

    var rn = normRoom(b);
    if (!rn) continue;

    var bl = rn.charAt(0) === 'G' ? 'garden' : 'flower';
    var key = bl + '-' + rn;
    var cond = String(row[9] || '').trim().toLowerCase();

    out[key] = {
      status:    cat,
      persons:   String(row[5] || '').trim(),
      checkin:   fmtDate(row[6]),
      checkout:  fmtDate(row[7]),
      guestName: String(row[3] || '').trim(),
      company:   String(row[4] || '').trim(),
      hkNotes:   String(row[8] || '').trim(),
      clean:     cond.indexOf('pa pastruar') >= 0 ? 'piseet' : 'paster'
    };
  }
  return out;
}

async function applyTrinosoft(parsed) {
  // Reset all rooms first, then apply Trinosoft data
  for (var k of Object.keys(rooms)) {
    rooms[k].status    = 'liree';
    rooms[k].persons   = '';
    rooms[k].checkin   = '';
    rooms[k].checkout  = '';
    rooms[k].guestName = '';
    rooms[k].company   = '';
    rooms[k].hkNotes   = '';
  }
  var ok = 0, miss = 0;
  for (var [key, data] of Object.entries(parsed)) {
    if (rooms[key]) {
      Object.assign(rooms[key], data);
      ok++;
    } else {
      console.warn('[Trinosoft] dhoma pa gjetur:', key);
      miss++;
    }
  }
  render();
  await push(false);
  var msg = ok + ' dhoma ngarkuar nga Trinosoft';
  if (miss > 0) msg += ' (' + miss + ' pa gjetur)';
  showToast('✅ ' + msg);
}

// ─── PRINT FLOOR ──────────────────────────────────────────────────────────────
function printFloor(fl) {
  var rs = Object.values(rooms).filter(function(r){ return r.bld === bld && r.fl === fl; });
  var slbl = { liree:'E lirë', ardhje:'Ardhje', largim:'Largim', qendrim:'Qëndrim' };
  var html = '<html><head><title>Pastrimi - ' + fl + '</title>' +
    '<style>body{font-family:Arial,sans-serif;font-size:10px;}' +
    'table{width:100%;border-collapse:collapse;}' +
    'th,td{border:1px solid #ccc;padding:3px 5px;text-align:center;}' +
    'th{background:#f0f0f0;}td:first-child{text-align:left;font-weight:bold;}' +
    'h2{font-size:13px;margin-bottom:6px;}</style></head><body>' +
    '<h2>Flower Hotel — Pastrimi — ' + fl + ' — ' + new Date().toLocaleDateString('sq-AL') + '</h2>' +
    '<table><tr><th>Nr.</th><th>Pers.</th><th>Check In</th><th>Check Out</th>' +
    '<th>Status</th><th>Pastrimi</th><th>VIP</th><th>ROM</th><th>DEC</th><th>WP</th><th>BC</th><th>Shënime</th></tr>';
  for (var r of rs) {
    html += '<tr>' +
      '<td>' + r.num + '</td>' +
      '<td>' + (r.persons || '') + '</td>' +
      '<td>' + (r.checkin || '') + '</td>' +
      '<td>' + (r.checkout || '') + '</td>' +
      '<td>' + (slbl[r.status] || r.status) + '</td>' +
      '<td>' + (r.clean === 'paster' ? 'E Pastër' : 'E Pisët') + '</td>' +
      '<td>' + (r.vip ? '✓' : '') + '</td>' +
      '<td>' + (r.rom ? '✓' : '') + '</td>' +
      '<td>' + (r.dec ? '✓' : '') + '</td>' +
      '<td>' + (r.wp  ? '✓' : '') + '</td>' +
      '<td>' + (r.bc  ? '✓' : '') + '</td>' +
      '<td>' + (r.notes || '') + '</td>' +
    '</tr>';
  }
  html += '</table></body></html>';
  var w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
  setTimeout(function(){ w.print(); }, 400);
}

// ─── SERVER SYNC ──────────────────────────────────────────────────────────────
async function push(silent) {
  try {
    var res = await fetch('/api/hms/state', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ state: rooms })
    });
    var ct = res.headers.get('content-type') || '';
    if (!ct.includes('json')) return;
    if (!silent) showToast('✅ U ruajt');
  } catch(e) { console.warn('[HK] push:', e.message); }
}

async function pull() {
  try {
    var res = await fetch('/api/hms/state');
    var ct = res.headers.get('content-type') || '';
    if (!ct.includes('json')) return;
    var d = await res.json();
    if (d && d.data && Object.keys(d.data).length > 0)
      for (var [k,v] of Object.entries(d.data))
        if (rooms[k]) Object.assign(rooms[k], v);
  } catch(e) { console.warn('[HK] pull:', e.message); }
}

async function pullAndRender() {
  document.getElementById('overlay').style.display = 'flex';
  await pull();
  render();
  document.getElementById('overlay').style.display = 'none';
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(function(){ t.style.display = 'none'; }, 2500);
}

// ─── SYNC BAR & AUTO REFRESH ──────────────────────────────────────────────────
document.getElementById('syncBar').innerHTML =
  'Pastrueset — hyjnë tek: <a href="/hk">' + location.host + '/hk</a>';

setInterval(function(){ pull().then(render); }, 60000);

// ─── INIT ─────────────────────────────────────────────────────────────────────
initRooms();
pull().then(function(){
  render();
  document.getElementById('overlay').style.display = 'none';
});
</script>
